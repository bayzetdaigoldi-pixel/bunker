<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бункер (простая версия)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ff6b35;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .counter {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 30px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .name {
            text-align: center;
            font-size: 1.2rem;
            color: #ff6b35;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .trait {
            background: #242424;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .trait.open {
            background: #332211;
            border-color: #ff6b35;
        }
        .trait-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .trait-icon {
            font-size: 1.5rem;
        }
        .trait-label {
            font-size: 0.8rem;
            color: #999;
        }
        .trait-value {
            font-size: 1rem;
        }
        .hidden-value {
            color: #666;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn.secondary {
            background: #242424;
            color: #ff6b35;
            border: 1px solid #ff6b35;
        }
        .progress {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #999;
        }
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #ff6b35;
            width: 0%;
            transition: width 0.3s;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>БУНКЕР</h1>
        
        <!-- Экран загрузки -->
        <div id="loading">
            <div class="loading">Загрузка...</div>
        </div>
        
        <!-- Игровой экран (изначально скрыт) -->
        <div id="game" class="hidden">
            <div class="counter">
                Открыто: <span id="openedCount">0</span>/8
            </div>
            
            <div class="card">
                <div class="name" id="characterName">...</div>
                <div id="traits"></div>
            </div>
            
            <div class="progress">
                <div class="progress-header">
                    <span>Прогресс</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <button class="btn" id="newBtn">🎲 Новый персонаж</button>
            <button class="btn secondary" id="resetBtn">🔒 Сбросить всё</button>
        </div>
    </div>

    <script>
        // Простые данные (сократил для надёжности)
        const DATA = {
            professions: ["Врач", "Инженер", "Военный", "Повар", "Сварщик"],
            health: ["Здоров", "Астма", "Диабет", "Плохое зрение"],
            mental: ["Уравновешенный", "Клаустрофобия", "Паника"],
            character: ["Лидер", "Добрый", "Эгоист"],
            skills: ["Рыбалка", "Охота", "Ремонт"],
            luggage: ["Аптечка", "Топор", "Нож"],
            backstory: ["Потерял семью", "Спас ребёнка"],
            features: ["Шрам", "Тату"]
        };

        const TRAITS = [
            { key: 'profession', label: 'Профессия', icon: '💼' },
            { key: 'health', label: 'Здоровье', icon: '❤️' },
            { key: 'mental', label: 'Психика', icon: '🧠' },
            { key: 'character', label: 'Характер', icon: '⚡' },
            { key: 'skills', label: 'Навыки', icon: '🔧' },
            { key: 'luggage', label: 'Багаж', icon: '🎒' },
            { key: 'backstory', label: 'Прошлое', icon: '📜' },
            { key: 'features', label: 'Особенности', icon: '👤' }
        ];

        // Состояние
        let character = null;
        let opened = [];
        let order = [];

        // Получаем элементы
        const loadingEl = document.getElementById('loading');
        const gameEl = document.getElementById('game');
        const nameEl = document.getElementById('characterName');
        const traitsEl = document.getElementById('traits');
        const openedCountEl = document.getElementById('openedCount');
        const progressFillEl = document.getElementById('progressFill');
        const progressPercentEl = document.getElementById('progressPercent');

        // Случайный элемент
        function random(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // Перемешать массив
        function shuffle(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        // Генерация персонажа
        function generateCharacter() {
            const char = {};
            TRAITS.forEach(t => {
                char[t.key] = random(DATA[t.key]);
            });
            return char;
        }

        // Обновление интерфейса
        function render() {
            if (!character || !order) return;
            
            // Имя
            nameEl.textContent = character.features || 'Выживший';
            
            // Счётчик
            const openedCount = opened.length;
            const total = TRAITS.length;
            openedCountEl.textContent = openedCount;
            
            // Прогресс
            const percent = Math.round((openedCount / total) * 100);
            progressFillEl.style.width = percent + '%';
            progressPercentEl.textContent = percent + '%';
            
            // Отрисовка характеристик
            traitsEl.innerHTML = '';
            
            order.forEach(key => {
                const trait = TRAITS.find(t => t.key === key);
                if (!trait) return;
                
                const isOpen = opened.includes(key);
                const value = character[key];
                
                const div = document.createElement('div');
                div.className = 'trait' + (isOpen ? ' open' : '');
                div.onclick = () => {
                    if (isOpen) {
                        // Закрыть
                        opened = opened.filter(k => k !== key);
                    } else {
                        // Открыть
                        opened.push(key);
                    }
                    render(); // Перерисовать
                };
                
                div.innerHTML = `
                    <div class="trait-left">
                        <span class="trait-icon">${trait.icon}</span>
                        <div>
                            <div class="trait-label">${trait.label}</div>
                            <div class="trait-value ${!isOpen ? 'hidden-value' : ''}">
                                ${isOpen ? value : '❓ ???'}
                            </div>
                        </div>
                    </div>
                    <span>${isOpen ? '✅' : '🔒'}</span>
                `;
                
                traitsEl.appendChild(div);
            });
        }

        // Новый персонаж
        function newCharacter() {
            character = generateCharacter();
            opened = [];
            order = shuffle(TRAITS.map(t => t.key));
            render();
        }

        // Сброс
        function resetAll() {
            opened = [];
            render();
        }

        // Запуск
        function init() {
            console.log('Запуск...');
            
            // Создаём первого персонажа
            newCharacter();
            
            // Прячем загрузку, показываем игру
            loadingEl.style.display = 'none';
            gameEl.classList.remove('hidden');
            
            // Назначаем кнопки
            document.getElementById('newBtn').onclick = () => {
                if (confirm('Новый персонаж?')) newCharacter();
            };
            
            document.getElementById('resetBtn').onclick = () => {
                if (confirm('Сбросить открытые?')) resetAll();
            };
        }

        // Ждём загрузку страницы
        window.onload = init;
    </script>
</body>
</html>
