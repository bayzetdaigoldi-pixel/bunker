<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>🛡️ БУНКЕР</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b35;
            --primary-glow: rgba(255, 107, 53, 0.5);
            --secondary: #00d9ff;
            --secondary-glow: rgba(0, 217, 255, 0.4);
            --success: #00ff88;
            --danger: #ff4757;
            --warning: #ffdd00;
            --bg-dark: #0a0a0a;
            --bg-card: rgba(20, 20, 20, 0.6);
            --bg-glass: rgba(30, 30, 30, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at 20% 10%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(0, 217, 255, 0.06) 0%, transparent 50%);
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            padding: 12px;
        }

        .container { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        .header { text-align: center; padding: 20px 10px; position: relative; }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, #ff8c5a 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px var(--primary-glow);
            animation: glow 3s ease-in-out infinite;
        }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 20px var(--primary-glow)); } 50% { filter: drop-shadow(0 0 30px var(--primary-glow)); } }
        .header .subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }

        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); }
        .card:hover { border-color: rgba(255, 107, 53, 0.3); box-shadow: 0 8px 32px rgba(255, 107, 53, 0.15); transform: translateY(-2px); }

        .card-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .room-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .room-code { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
        .round-info { font-size: 0.8rem; color: var(--text-muted); }
        .round-info span { color: var(--primary); font-weight: 600; }

        .btn {
            width: 100%;
            padding: 16px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent); transition: left 0.5s; }
        .btn:hover::before { left: 100%; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, #ff8c5a 100%); color: #fff; box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-primary:hover { box-shadow: 0 6px 30px var(--primary-glow); }
        .btn-secondary { background: var(--bg-glass); color: var(--primary); border: 1px solid var(--primary); }
        .btn-secondary:hover { background: rgba(255, 107, 53, 0.1); box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-danger { background: linear-gradient(135deg, var(--danger) 0%, #ff6b7a 100%); color: #fff; box-shadow: 0 4px 20px rgba(255, 71, 87, 0.4); }
        .btn-success { background: linear-gradient(135deg, var(--success) 0%, #00ff88 100%); color: #000; box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4); }
        .btn-warning { background: linear-gradient(135deg, var(--warning) 0%, #ffdd00 100%); color: #000; box-shadow: 0 4px 20px rgba(255, 221, 0, 0.4); }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .player-item {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .player-item.is-you { border-color: var(--secondary); box-shadow: 0 4px 20px var(--secondary-glow); }
        .player-item.is-host { border-color: var(--primary); box-shadow: 0 4px 20px var(--primary-glow); }
        .player-item .name { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; word-break: break-word; }
        .player-item .status { font-size: 0.7rem; color: var(--text-muted); }
        .player-item .status.revealed { color: var(--primary); }
        .player-item .status.eliminated { color: var(--danger); text-decoration: line-through; }
        .player-item .stats-progress { font-size: 0.65rem; color: var(--primary); margin-top: 6px; font-weight: 600; }
        .player-item .votes-count { font-size: 0.7rem; color: var(--danger); margin-top: 4px; font-weight: 700; }

        .character-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
        }
        .character-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats-grid { display: grid; gap: 10px; }
        .stat-item {
            display: flex;
            padding: 14px 16px;
            background: var(--bg-glass);
            border-radius: 14px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .stat-item.revealed { border-color: rgba(255, 107, 53, 0.3); background: rgba(255, 107, 53, 0.05); }
        .stat-item.hidden { opacity: 0.6; }
        .stat-item.my-hidden { border-color: var(--secondary); background: rgba(0, 217, 255, 0.05); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); min-width: 90px; flex-shrink: 0; }
        .stat-value { font-size: 0.85rem; color: var(--text); font-weight: 500; }
        .stat-value.hidden { color: var(--text-muted); font-style: italic; }

        .stat-select { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 16px; }
        .stat-select-btn {
            padding: 14px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }
        .stat-select-btn:hover:not(:disabled) { border-color: var(--primary); background: rgba(255, 107, 53, 0.1); box-shadow: 0 4px 15px var(--primary-glow); transform: translateY(-2px); }
        .stat-select-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .vote-section {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-top: 12px;
        }
        .vote-section h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .vote-section .vote-info {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }
        .vote-player-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .vote-player-card .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .vote-player-card .player-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .vote-player-card .player-stats {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .vote-player-card .vote-actions {
            display: flex;
            gap: 8px;
        }
        .vote-player-card .vote-actions button {
            flex: 1;
            padding: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .vote-player-card .vote-actions .btn-vote-eliminate {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .vote-player-card .vote-actions .btn-vote-eliminate:hover {
            background: rgba(255, 71, 87, 0.4);
        }
        .vote-player-card .vote-actions .btn-vote-eliminate.selected {
            background: var(--danger);
            color: #fff;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #ff8c5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            text-align: center;
        }
        .modal input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; max-width: 300px; }
        .toast {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.warning { border-left: 3px solid var(--warning); }
        .toast.info { border-left: 3px solid var(--secondary); }

        .game-status {
            text-align: center;
            padding: 15px;
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid var(--primary);
            border-radius: 16px;
            margin-bottom: 10px;
        }
        .game-status .status-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        .game-status .survivors-count {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 700;
        }

        .elimination-result {
            background: rgba(255, 71, 87, 0.15);
            border: 2px solid var(--danger);
            border-radius: 20px;
            padding: 20px;
            margin-top: 12px;
            text-align: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .elimination-result h4 {
            font-family: 'Orbitron', sans-serif;
            color: var(--danger);
            font-size: 1rem;
            margin-bottom: 10px;
        }
        .elimination-result .eliminated-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }

        footer { text-align: center; padding: 20px; margin-top: 10px; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid var(--border); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>БУНКЕР</h1>
            <div class="subtitle">Последний выживший</div>
        </div>

        <div class="room-bar" id="roomBar">
            <span class="room-code" id="roomCodeDisplay">----</span>
            <div class="round-info">Раунд <span id="roundDisplay">0</span>/<span id="totalRounds">0</span></div>
            <div class="round-info">👥 <span id="playersCount">0</span></div>
        </div>

        <div class="game-status" id="gameStatus">

            <div class="survivors-count" id="survivorsCount">Выживших: 0</div>
        </div>

        <div id="mainMenu" class="btn-group">
            <button class="btn btn-primary" id="createRoomBtn">🏠 Создать комнату</button>
            <button class="btn btn-secondary" id="joinRoomBtn">🚪 Присоединиться</button>
        </div>

        <div id="gameArea" class="hidden">
            <div class="btn-group" id="hostControls">
                <div class="btn-row">
                    <button class="btn btn-secondary" id="genBunkerBtn">🏗️ Бункер</button>

                </div>
            </div>

            <button class="btn btn-primary" id="startRoundBtn">▶️ НАЧАТЬ РАУНД</button>
            <button class="btn btn-success" id="startVoteBtn">🗳️ НАЧАТЬ ГОЛОСОВАНИЕ</button>

            <div class="card">
                <div class="card-header">👥 ИГРОКИ</div>
                <div class="players-grid" id="playersGrid"></div>

            <div class="elimination-result" id="eliminationResult">
                <h4>🚫 ВЫГНАН ИЗ БУНКЕРА</h4>

            <div class="character-card" id="myCharacterCard">

                <div class="stat-select" id="statSelect">
                    <button class="stat-select-btn" data-stat="profession">💼 Профессия</button>
                    <button class="stat-select-btn" data-stat="health">❤️ Здоровье</button>
                    <button class="stat-select-btn" data-stat="hobby">🎨 Хобби</button>
                    <button class="stat-select-btn" data-stat="luggage">🎒 Багаж</button>
                    <button class="stat-select-btn" data-stat="mental">😰 Фобии</button>
                    <button class="stat-select-btn" data-stat="genderAge">👤 Пол/Возраст</button>
                </div>
            </div>

            <div class="vote-section" id="voteSection">
                <h3>🗳️ ГОЛОСОВАНИЕ</h3>
                <div class="vote-info">Выберите ОДНОГО игрока на выгон. Нельзя голосовать за себя.</div>
                <div id="votePlayersList"></div>
            </div>

            <div class="card" id="bunkerCard">
                <div class="card-header">🏗️ БУНКЕР</div>
                <div class="stats-grid" id="bunkerContent"></div>
            </div>

            <div class="card" id="disasterCard">
                <div class="card-header">☢️ КАТАСТРОФА</div>
                <div class="stats-grid" id="disasterContent"></div>
            </div>
        </div>

        <div id="loadingScreen" class="hidden" style="text-align:center;padding:40px;">
            <div class="spinner" style="width:50px;height:50px;border:4px solid rgba(255,107,53,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;"></div>
            <p>Подключение...</p>
        </div>

        <footer>© 2026 БУНКЕР • Telegram Edition</footer>
    </div>

    <div class="modal-overlay" id="joinModal">
        <div class="modal">
            <h2>Вход в комнату</h2>
            <input type="text" id="roomCodeInput" placeholder="Код комнаты" maxlength="6">
            <input type="text" id="playerNameInput2" placeholder="Ваше имя" maxlength="20">
            <div class="btn-row">
                <button class="btn btn-primary" id="confirmJoinBtn">Войти</button>
                <button class="btn btn-danger" id="cancelJoinBtn">Отмена</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    el.className = `toast ${type}`;

// Данные
const DATA = {

// ============================================
// FIREBASE ФУНКЦИИ
// ============================================
const createRoom = async () => {
    if (!firebaseConnected) {
        toast('Firebase не подключён! Проверьте конфиг.', 'error');
        return;
    }
    
    const roomId = generateRoomId();
    const name = tg.initDataUnsafe?.user?.username || 'Игрок ' + Math.floor(Math.random() * 1000);
    
    state.playerId = 'p_' + Date.now();
    state.isHost = true;
    state.playerName = name;
    state.roomId = roomId;
    
    const roomData = {
        roomId,
        hostId: state.playerId,
        phase: PHASES.LOBBY,
        round: 0,
        totalRounds: 0,
        bunker: null,
        disaster: null,
        players: {
            [state.playerId]: {
                id: state.playerId,
                name,
                character: null,
                revealedStats: [],
                votesReceived: 0,
                eliminated: false,
                votedFor: null
            }
        },
        lastUpdate: Date.now()
    };
    
    try {
        await setDoc(doc(db, 'rooms', roomId), roomData);
        subscribeToRoom(roomId);
        updateUI();
        toast(`Комната ${roomId} создана!`, 'success');
        haptic.success();
    } catch (e) {
        console.error('Ошибка создания комнаты:', e);
        toast('Ошибка создания комнаты', 'error');
    }
};

const joinRoom = async (roomId, name) => {
    if (!firebaseConnected) {
        toast('Firebase не подключён!', 'error');
        return false;
    }
    
    roomId = roomId.toUpperCase().trim();
    
    try {
        const roomRef = doc(db, 'rooms', roomId);
        const roomSnap = await getDoc(roomRef);
        
        if (!roomSnap.exists()) {
            toast('Комната не найдена!', 'error');
            return false;
        }
        
        const roomData = roomSnap.data();
        if (roomData.phase !== PHASES.LOBBY) {
            toast('Игра уже началась!', 'error');
            return false;
        }
        
        state.playerId = 'p_' + Date.now();
        state.isHost = false;
        state.playerName = name;
        state.roomId = roomId;
        
        await updateDoc(roomRef, {
            [`players.${state.playerId}`]: {
                id: state.playerId,
                name,
                character: null,
                revealedStats: [],
                votesReceived: 0,
                eliminated: false,
                votedFor: null
            },
            lastUpdate: Date.now()
        });
        
        subscribeToRoom(roomId);
        updateUI();
        toast(`Присоединился к ${roomId}!`, 'success');
        haptic.success();
        return true;
    } catch (e) {
        console.error('Ошибка присоединения:', e);
        toast('Ошибка присоединения', 'error');
        return false;
    }
};

const subscribeToRoom = (roomId) => {
    if (state.unsubscribe) {
        state.unsubscribe();
    }
    
    state.unsubscribe = onSnapshot(doc(db, 'rooms', roomId), (docSnapshot) => {
        if (!docSnapshot.exists()) {
            toast('Комната удалена!', 'error');
            resetState();
            return;
        }
        
        state.gameData = docSnapshot.data();
        updateUI();
    }, (error) => {
        console.error('Ошибка подписки:', error);
        toast('Потеряно соединение', 'error');
    });
};

const updateRoom = async (updates) => {
    if (!state.roomId || !db) return;
    try {
        await updateDoc(doc(db, 'rooms', state.roomId), {
            ...updates,
            lastUpdate: Date.now()
        });
    } catch (e) {
        console.error('Ошибка обновления:', e);
    }
};

const leaveRoom = async () => {
    if (!state.roomId || !db) {
        resetState();
        return;
    }
    
    try {
        const roomRef = doc(db, 'rooms', state.roomId);
        const roomSnap = await getDoc(roomRef);
        
        if (roomSnap.exists()) {
            const roomData = roomSnap.data();
            
            if (state.isHost) {
                const otherPlayers = Object.values(roomData.players || {}).filter(p => p && p.id !== state.playerId);
                if (otherPlayers.length > 0) {
                    await updateDoc(roomRef, {
                        hostId: otherPlayers[0].id,
                        [`players.${state.playerId}`]: null,
                        lastUpdate: Date.now()
                    });
                } else {
                    await deleteDoc(roomRef);
                }
            } else {
                await updateDoc(roomRef, {
                    [`players.${state.playerId}`]: null,
                    lastUpdate: Date.now()
                });
            }
        }
    } catch (e) {
        console.error('Ошибка выхода:', e);
    }
    
    resetState();
    toast('Вы покинули комнату', 'info');
};

const resetState = () => {
    if (state.unsubscribe) state.unsubscribe();
    state.roomId = null;
    state.playerId = null;
    state.isHost = false;
    state.gameData = null;
    $('mainMenu').classList.remove('hidden');
    $('gameArea').classList.add('hidden');
    $('roomBar').classList.add('hidden');
    $('gameStatus').classList.add('hidden');
};

// ============================================
// ИГРОВАЯ ЛОГИКА
// ============================================
const getActivePlayers = () => {
    if (!state.gameData?.players) return [];
    return Object.values(state.gameData.players).filter(p => p && !p.eliminated);
};

const getSurvivorsCount = () => getActivePlayers().length;

const startRound = async () => {
    const game = state.gameData;
    if (!game) return;
    
    const activeCount = getActivePlayers().length;
    
    if (game.round === 0) {
        game.totalRounds = Math.max(1, activeCount - 1);
    }
    
    game.round++;
    game.phase = PHASES.REVEAL;
    
    const playersUpdate = {};
    Object.values(game.players).filter(p => p).forEach(p => {
        if (!p.eliminated) {
            if (!p.character) {
                p.character = Generators.character(p.name);
            }
            playersUpdate[`players.${p.id}.character`] = p.character;
            playersUpdate[`players.${p.id}.votesReceived`] = 0;
            playersUpdate[`players.${p.id}.votedFor`] = null;
        }
    });
    
    await updateRoom({
        phase: PHASES.REVEAL,
        round: game.round,
        totalRounds: game.totalRounds,
        ...playersUpdate
    });
    
    updateUI();
    toast(`Раунд ${game.round}/${game.totalRounds}! Открывайте характеристики`, 'info');
};

const startVote = async () => {
    const game = state.gameData;
    if (!game) return;
    
    await updateRoom({
        phase: PHASES.VOTE
    });
    
    state.selectedVote = null;
    updateUI();
    toast('Голосование началось!', 'warning');
};

const processVoteResults = async () => {
    const game = state.gameData;
    if (!game) return;
    
    const activePlayers = getActivePlayers();
    
    let maxVotes = 0;
    let eliminated = null;
    let tie = false;
    let abstainCount = 0;
    
    activePlayers.forEach(p => {
        if (p.votedFor === 'abstain') abstainCount++;
        if (p.votesReceived > maxVotes) {
            maxVotes = p.votesReceived;
            eliminated = p;
            tie = false;
        } else if (p.votesReceived === maxVotes && maxVotes > 0) {
            tie = true;
        }
    });
    
    $('eliminationResult').classList.add('hidden');
    
    if (eliminated && maxVotes > 0 && !tie) {
        eliminated.eliminated = true;
        
        $('eliminatedName').textContent = eliminated.name;
        $('eliminationResult').classList.remove('hidden');
        
        toast(`${eliminated.name} выгнан!`, 'error');
        haptic.error();
        
        if (getSurvivorsCount() <= 1) {
            await updateRoom({
                phase: PHASES.ENDED,
                [`players.${eliminated.id}.eliminated`]: true
            });
            updateUI();
            return;
        }
        
        await updateRoom({
            phase: PHASES.LOBBY,
            [`players.${eliminated.id}.eliminated`]: true
        });
    } else if (tie) {
        toast('Ничья! Никто не выгнан', 'warning');
        await updateRoom({ phase: PHASES.LOBBY });
    } else {
        toast('Все воздержались!', 'success');
        await updateRoom({ phase: PHASES.LOBBY });
    }
    
    updateUI();
};

const revealStat = async (statKey) => {
    const player = state.gameData?.players?.[state.playerId];
    if (!player?.character) return;
    
    if (!player.character.revealedStats.includes(statKey)) {
        player.character.revealedStats.push(statKey);
        await updateRoom({
            [`players.${state.playerId}.character.revealedStats`]: player.character.revealedStats
        });
        renderMyCharacter(player.character);
        updatePlayersGrid();
        toast('Характеристика открыта!', 'success');
    }
};

const voteForPlayer = async (targetId) => {
    if (targetId === state.playerId) {
        toast('Нельзя голосовать за себя!', 'error');
        return;
    }
    
    const game = state.gameData;
    const player = game?.players?.[state.playerId];
    if (!player) return;
    
    // Снимаем предыдущий голос
    if (player.votedFor && player.votedFor !== 'abstain') {
        const prevTarget = game.players[player.votedFor];
        if (prevTarget) {
            await updateRoom({
                [`players.${player.votedFor}.votesReceived`]: Math.max(0, (prevTarget.votesReceived || 1) - 1)
            });
        }
    }
    
    // Голосуем за нового
    const target = game.players[targetId];
    if (target) {
        player.votedFor = targetId;
        target.votesReceived = (target.votesReceived || 0) + 1;
        state.selectedVote = targetId;
        
        await updateRoom({
            [`players.${state.playerId}.votedFor`]: targetId,
            [`players.${targetId}.votesReceived`]: target.votesReceived
        });
        
        renderVoteSection();
        haptic.selection();
        checkAllVoted();
    }
};

window.voteForPlayer = voteForPlayer;

window.voteAbstain = async () => {
    const game = state.gameData;
    const player = game?.players?.[state.playerId];
    if (!player) return;
    
    // Снимаем предыдущий голос
    if (player.votedFor && player.votedFor !== 'abstain') {
        const prevTarget = game.players[player.votedFor];
        if (prevTarget) {
            await updateRoom({
                [`players.${player.votedFor}.votesReceived`]: Math.max(0, (prevTarget.votesReceived || 1) - 1)
            });
        }
    }
    
    player.votedFor = 'abstain';
    state.selectedVote = 'abstain';
    
    await updateRoom({
        [`players.${state.playerId}.votedFor`]: 'abstain'
    });
    
    renderVoteSection();
    haptic.selection();
    toast('Вы воздержались', 'info');
    checkAllVoted();
};

const checkAllVoted = () => {
    const activePlayers = getActivePlayers();
    const allVoted = activePlayers.every(p => p.votedFor !== null);
    
    if (allVoted) {
        setTimeout(processVoteResults, 1500);
    }
};

// ============================================
// UI ФУНКЦИИ
// ============================================
const updateUI = () => {
    if (!state.gameData) return;
    const game = state.gameData;
    
    $('roomBar').classList.remove('hidden');
    $('gameStatus').classList.remove('hidden');
    $('roomCodeDisplay').textContent = game.roomId;
    $('roundDisplay').textContent = game.round || 0;
    $('totalRounds').textContent = game.totalRounds || '-';
    $('playersCount').textContent = Object.keys(game.players || {}).length;
    
    $('mainMenu').classList.add('hidden');
    $('gameArea').classList.remove('hidden');
    $('hostControls').classList.toggle('hidden', !state.isHost);
    
    const survivors = getActivePlayers();
    $('survivorsCount').textContent = `Выживших: ${survivors.length}`;
    
    const statusTexts = {
        [PHASES.LOBBY]: 'Нажмите "Начать раунд"',
        [PHASES.REVEAL]: 'Откройте характеристики',
        [PHASES.VOTE]: 'Голосование',
        [PHASES.RESULT]: 'Результат',
        [PHASES.ENDED]: 'Игра окончена'
    };
    $('statusText').textContent = statusTexts[game.phase] || '...';
    
    const showStartRound = (game.phase === PHASES.LOBBY || game.phase === PHASES.RESULT) && survivors.length >= 1;
    const showStartVote = game.phase === PHASES.REVEAL;
    
    $('startRoundBtn').classList.toggle('hidden', !showStartRound);
    $('startRoundBtn').textContent = game.round === 0 ? '▶️ НАЧАТЬ ИГРУ' : '▶️ СЛЕДУЮЩИЙ РАУНД';
    $('startVoteBtn').classList.toggle('hidden', !showStartVote);
    $('voteSection').classList.toggle('hidden', game.phase !== PHASES.VOTE);
    
    if (game.phase === PHASES.VOTE) {
        renderVoteSection();
    }
    
    updatePlayersGrid();
    
    if (game.bunker) {
        renderBunker(game.bunker);
        $('bunkerCard').classList.remove('hidden');
    }
    if (game.disaster) {
        renderDisaster(game.disaster);
        $('disasterCard').classList.remove('hidden');
    }
    
    const myPlayer = game.players?.[state.playerId];
    if (myPlayer?.character && !myPlayer.eliminated) {
        $('myCharacterCard').classList.remove('hidden');
        renderMyCharacter(myPlayer.character);
        
        const allRevealed = (myPlayer.character.revealedStats?.length || 0) >= 6;
        $('statSelect').classList.toggle('hidden', allRevealed);
    }
};

const updatePlayersGrid = () => {
    const grid = $('playersGrid');
    const game = state.gameData;
    if (!game?.players) return;
    
    grid.innerHTML = Object.values(game.players).filter(p => p).map(p => {
        const count = p.character?.revealedStats?.length || 0;
        let statusClass = '';
        let statusText = '⏳ Ожидание';
        
        if (p.eliminated) {
            statusClass = 'eliminated';
            statusText = '❌ Выгнан';
        } else if (p.character) {
            statusClass = 'revealed';
            statusText = `${count}/6 открыто`;
        }
        
        return `<div class="player-item ${p.id === state.playerId ? 'is-you' : ''} ${p.id === game.hostId ? 'is-host' : ''}">
            <div class="name">${p.name} ${p.id === state.playerId ? '(Вы)' : ''} ${p.id === game.hostId ? '👑' : ''}</div>
            <div class="status ${statusClass}">${statusText}</div>
            ${p.character ? `<div class="stats-progress">${p.character.profession}</div>` : ''}
            ${game.phase === PHASES.VOTE && p.votesReceived > 0 ? `<div class="votes-count">Голосов: ${p.votesReceived}</div>` : ''}
        </div>`;
    }).join('');
};

const renderVoteSection = () => {
    const container = $('votePlayersList');
    const activePlayers = getActivePlayers();
    
    container.innerHTML = `
        <div class="vote-player-card" style="border-color: var(--success);">
            <div class="player-info">
                <span class="player-name" style="color: var(--success);">⚠️ Воздержаться</span>
            </div>
            <div class="player-stats">Никого не выгонять</div>
            <div class="vote-actions">
                <button class="btn-vote-eliminate ${state.selectedVote === 'abstain' ? 'selected' : ''}" 
                        onclick="window.voteAbstain()">
                    ${state.selectedVote === 'abstain' ? '✓ Выбрано' : 'Воздержаться'}
                </button>
            </div>
        </div>
    ` + activePlayers.map(p => `
        <div class="vote-player-card">
            <div class="player-info">
                <span class="player-name">${p.name} ${p.id === state.playerId ? '(Вы)' : ''}</span>
                ${p.votesReceived > 0 ? `<span style="color:var(--danger);font-weight:700;">🗳️ ${p.votesReceived}</span>` : ''}
            </div>
            <div class="player-stats">${p.character?.profession || '?'} • ${p.character?.genderAge || '?'}</div>
            <div class="vote-actions">
                <button class="btn-vote-eliminate ${state.selectedVote === p.id ? 'selected' : ''}" 
                        onclick="window.voteForPlayer('${p.id}')"
                        ${p.id === state.playerId ? 'disabled' : ''}>
                    ${p.id === state.playerId ? 'Себя нельзя' : (state.selectedVote === p.id ? '✓ Выбран' : 'Выгнать')}
                </button>
            </div>
        </div>
    `).join('');
};

const renderMyCharacter = (char) => {
    $('myCharacterName').textContent = char.name;
    const stats = [
        { key: 'profession', label: 'Профессия' },
        { key: 'health', label: 'Здоровье' },
        { key: 'hobby', label: 'Хобби' },
        { key: 'luggage', label: 'Багаж' },
        { key: 'mental', label: 'Фобии' },
        { key: 'genderAge', label: 'Пол/Возраст' }
    ];
    
    $('myCharacterStats').innerHTML = stats.map(s => {
        const revealed = char.revealedStats?.includes(s.key);
        const className = revealed ? 'revealed' : 'my-hidden';
        return `<div class="stat-item ${className}">
            <span class="stat-label">${s.label}:</span>
            <span class="stat-value">${char[s.key]}</span>
        </div>`;
    }).join('');
    
    $('statSelect').querySelectorAll('.stat-select-btn').forEach(btn => {
        btn.disabled = char.revealedStats?.includes(btn.dataset.stat);
    });
};

const renderBunker = (bunker) => {
    const labels = { type: 'Тип', size: 'Размер', depth: 'Глубина', protection: 'Защита', supplies: 'Запасы', water: 'Вода', power: 'Энергия', feature: 'Особенность' };
    $('bunkerContent').innerHTML = Object.entries(bunker).map(([k, v]) => 
        `<div class="stat-item revealed"><span class="stat-label">${labels[k]}:</span><span class="stat-value">${v}</span></div>`
    ).join('');
};

const renderDisaster = (disaster) => {
    const labels = { type: 'Тип', cause: 'Причина', scale: 'Масштаб', surface: 'Поверхность', threat: 'Угроза' };
    $('disasterContent').innerHTML = Object.entries(disaster).map(([k, v]) => 
        `<div class="stat-item revealed"><span class="stat-label">${labels[k]}:</span><span class="stat-value">${v}</span></div>`
    ).join('');
};

const setupEvents = () => {
    $('createRoomBtn').onclick = () => { haptic.impact(); createRoom(); };
    
    $('joinRoomBtn').onclick = () => {
        haptic.impact();
        $('joinModal').classList.add('active');
    };
    
    $('cancelJoinBtn').onclick = () => {
        $('joinModal').classList.remove('active');
    };
    
    $('confirmJoinBtn').onclick = () => {
        const code = $('roomCodeInput').value.toUpperCase().trim();
        const name = $('playerNameInput2').value.trim() || 'Игрок';
        if (code && joinRoom(code, name)) {
            $('joinModal').classList.remove('active');
        }
    };
    
    $('startRoundBtn').onclick = () => { haptic.impact(); startRound(); };
    $('startVoteBtn').onclick = () => { haptic.impact(); startVote(); };
    
    $('genBunkerBtn').onclick = async () => {
        haptic.impact();
        state.gameData.bunker = Generators.bunker();
        await updateRoom({ bunker: state.gameData.bunker });
        renderBunker(state.gameData.bunker);
        toast('Бункер создан', 'success');
    };
    
    $('genDisasterBtn').onclick = async () => {
        haptic.impact();
        state.gameData.disaster = Generators.disaster();
        await updateRoom({ disaster: state.gameData.disaster });
        renderDisaster(state.gameData.disaster);
        toast('Катастрофа создана', 'success');
    };
    
    $('statSelect').addEventListener('click', (e) => {
        if (e.target.classList.contains('stat-select-btn') && !e.target.disabled) {
            haptic.selection();
            revealStat(e.target.dataset.stat);
        }
    });
};

// Инициализация
setupEvents();

// Проверяем подключение при загрузке
if (!firebaseConnected) {
    toast('⚠️ Firebase не подключён!', 'warning');
}
</script>
</body>
</html>
