<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>🛡️ БУНКЕР</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b35;
            --primary-glow: rgba(255, 107, 53, 0.5);
            --secondary: #00d9ff;
            --secondary-glow: rgba(0, 217, 255, 0.4);
            --success: #00ff88;
            --danger: #ff4757;
            --warning: #ffdd00;
            --bg-dark: #0a0a0a;
            --bg-card: rgba(20, 20, 20, 0.6);
            --bg-glass: rgba(30, 30, 30, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at 20% 10%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(0, 217, 255, 0.06) 0%, transparent 50%);
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            padding: 12px;
        }

        .container { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        .header { text-align: center; padding: 20px 10px; position: relative; }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, #ff8c5a 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px var(--primary-glow);
            animation: glow 3s ease-in-out infinite;
        }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 20px var(--primary-glow)); } 50% { filter: drop-shadow(0 0 30px var(--primary-glow)); } }
        .header .subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }

        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); }
        .card:hover { border-color: rgba(255, 107, 53, 0.3); box-shadow: 0 8px 32px rgba(255, 107, 53, 0.15); transform: translateY(-2px); }

        .card-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .room-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .room-code { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
        .round-info { font-size: 0.8rem; color: var(--text-muted); }
        .round-info span { color: var(--primary); font-weight: 600; }

        .btn {
            width: 100%;
            padding: 16px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent); transition: left 0.5s; }
        .btn:hover::before { left: 100%; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, #ff8c5a 100%); color: #fff; box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-primary:hover { box-shadow: 0 6px 30px var(--primary-glow); }
        .btn-secondary { background: var(--bg-glass); color: var(--primary); border: 1px solid var(--primary); }
        .btn-secondary:hover { background: rgba(255, 107, 53, 0.1); box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-danger { background: linear-gradient(135deg, var(--danger) 0%, #ff6b7a 100%); color: #fff; box-shadow: 0 4px 20px rgba(255, 71, 87, 0.4); }
        .btn-success { background: linear-gradient(135deg, var(--success) 0%, #00ff88 100%); color: #000; box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4); }
        .btn-warning { background: linear-gradient(135deg, var(--warning) 0%, #ffdd00 100%); color: #000; box-shadow: 0 4px 20px rgba(255, 221, 0, 0.4); }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .player-item {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .player-item.is-you { border-color: var(--secondary); box-shadow: 0 4px 20px var(--secondary-glow); }
        .player-item.is-host { border-color: var(--primary); box-shadow: 0 4px 20px var(--primary-glow); }
        .player-item .name { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; word-break: break-word; }
        .player-item .status { font-size: 0.7rem; color: var(--text-muted); }
        .player-item .status.revealed { color: var(--primary); }
        .player-item .status.eliminated { color: var(--danger); text-decoration: line-through; }
        .player-item .stats-progress { font-size: 0.65rem; color: var(--primary); margin-top: 6px; font-weight: 600; }
        .player-item .votes-count { font-size: 0.7rem; color: var(--danger); margin-top: 4px; font-weight: 700; }

        .character-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
        }
        .character-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats-grid { display: grid; gap: 10px; }
        .stat-item {
            display: flex;
            padding: 14px 16px;
            background: var(--bg-glass);
            border-radius: 14px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .stat-item.revealed { border-color: rgba(255, 107, 53, 0.3); background: rgba(255, 107, 53, 0.05); }
        .stat-item.hidden { opacity: 0.6; }
        .stat-item.my-hidden { border-color: var(--secondary); background: rgba(0, 217, 255, 0.05); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); min-width: 90px; flex-shrink: 0; }
        .stat-value { font-size: 0.85rem; color: var(--text); font-weight: 500; }
        .stat-value.hidden { color: var(--text-muted); font-style: italic; }

        .stat-select { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 16px; }
        .stat-select-btn {
            padding: 14px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }
        .stat-select-btn:hover:not(:disabled) { border-color: var(--primary); background: rgba(255, 107, 53, 0.1); box-shadow: 0 4px 15px var(--primary-glow); transform: translateY(-2px); }
        .stat-select-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .vote-section {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-top: 12px;
        }
        .vote-section h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .vote-section .vote-info {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }
        .vote-player-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .vote-player-card .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .vote-player-card .player-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .vote-player-card .player-stats {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .vote-player-card .vote-actions {
            display: flex;
            gap: 8px;
        }
        .vote-player-card .vote-actions button {
            flex: 1;
            padding: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .vote-player-card .vote-actions .btn-vote-eliminate {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .vote-player-card .vote-actions .btn-vote-eliminate:hover {
            background: rgba(255, 71, 87, 0.4);
        }
        .vote-player-card .vote-actions .btn-vote-eliminate.selected {
            background: var(--danger);
            color: #fff;
        }

        .phase-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .phase-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s;
        }
        .phase-dot.active {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        .phase-dot.discussion { background: var(--warning); }
        .phase-dot.vote { background: var(--danger); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #ff8c5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            text-align: center;
        }
        .modal input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; max-width: 300px; }
        .toast {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.warning { border-left: 3px solid var(--warning); }
        .toast.info { border-left: 3px solid var(--secondary); }

        .game-status {
            text-align: center;
            padding: 15px;
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid var(--primary);
            border-radius: 16px;
            margin-bottom: 10px;
        }
        .game-status .status-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        .game-status .survivors-count {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 700;
        }

        .elimination-result {
            background: rgba(255, 71, 87, 0.15);
            border: 2px solid var(--danger);
            border-radius: 20px;
            padding: 20px;
            margin-top: 12px;
            text-align: center;
            animation: pulse 2s infinite;
        }
        .elimination-result h4 {
            font-family: 'Orbitron', sans-serif;
            color: var(--danger);
            font-size: 1rem;
            margin-bottom: 10px;
        }
        .elimination-result .eliminated-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }

        footer { text-align: center; padding: 20px; margin-top: 10px; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>БУНКЕР</h1>
            <div class="subtitle">Последний выживший</div>
        </div>

        <div class="room-bar" id="roomBar" style="display:none;">
            <span class="room-code" id="roomCodeDisplay">----</span>
            <div class="round-info">Раунд <span id="roundDisplay">0</span>/<span id="totalRounds">0</span></div>
            <div class="round-info">👥 <span id="playersCount">0</span></div>
        </div>

        <div class="game-status" id="gameStatus" style="display:none;">
            <div class="status-text" id="statusText">Игра идёт</div>
            <div class="survivors-count" id="survivorsCount">Выживших: 0</div>
        </div>

        <div id="mainMenu" class="btn-group">
            <button class="btn btn-primary" id="createRoomBtn">🏠 Создать комнату</button>
            <button class="btn btn-secondary" id="joinRoomBtn">🚪 Присоединиться</button>
            <button class="btn btn-secondary" id="historyBtn">📜 История</button>
        </div>

        <div id="gameArea" style="display:none;">
            <div class="btn-group" id="hostControls" style="display:none;">
                <div class="btn-row">
                    <button class="btn btn-secondary" id="genBunkerBtn">🏗️ Бункер</button>
                    <button class="btn btn-secondary" id="genDisasterBtn">☢️ Катастрофа</button>
                </div>
            </div>

            <!-- Кнопки управления -->
            <button class="btn btn-primary" id="startRoundBtn" style="display:none;">▶️ НАЧАТЬ РАУНД</button>
            <button class="btn btn-success" id="startVoteBtn" style="display:none;">🗳️ НАЧАТЬ ГОЛОСОВАНИЕ</button>

            <div class="card">
                <div class="card-header">👥 ИГРОКИ</div>
                <div class="players-grid" id="playersGrid"></div>
            </div>

            <!-- Результат выгона -->
            <div class="elimination-result" id="eliminationResult" style="display:none;">
                <h4>🚫 ВЫГНАН ИЗ БУНКЕРА</h4>
                <div class="eliminated-name" id="eliminatedName">???</div>
            </div>

            <!-- Моя карточка -->
            <div class="character-card" id="myCharacterCard" style="display:none;">
                <div class="character-name" id="myCharacterName">Имя</div>
                <div class="stats-grid" id="myCharacterStats"></div>
                
                <div class="stat-select" id="statSelect" style="display:none;">
                    <button class="stat-select-btn" data-stat="profession">💼 Профессия</button>
                    <button class="stat-select-btn" data-stat="health">❤️ Здоровье</button>
                    <button class="stat-select-btn" data-stat="hobby">🎨 Хобби</button>
                    <button class="stat-select-btn" data-stat="luggage">🎒 Багаж</button>
                    <button class="stat-select-btn" data-stat="mental">😰 Фобии</button>
                    <button class="stat-select-btn" data-stat="genderAge">👤 Пол/Возраст</button>
                </div>
            </div>

            <!-- Секция голосования -->
            <div class="vote-section" id="voteSection" style="display:none;">
                <h3>🗳️ ГОЛОСОВАНИЕ</h3>
                <div class="vote-info">Выберите ОДНОГО игрока на выгон. Нельзя голосовать за себя.</div>
                <div id="votePlayersList"></div>
            </div>

            <div class="card" id="bunkerCard" style="display:none;">
                <div class="card-header">🏗️ БУНКЕР</div>
                <div class="stats-grid" id="bunkerContent"></div>
            </div>

            <div class="card" id="disasterCard" style="display:none;">
                <div class="card-header">☢️ КАТАСТРОФА</div>
                <div class="stats-grid" id="disasterContent"></div>
            </div>
        </div>

        <footer>© 2026 БУНКЕР • Telegram Edition</footer>
    </div>

    <div class="modal-overlay" id="joinModal">
        <div class="modal">
            <h2>Вход в комнату</h2>
            <input type="text" id="roomCodeInput" placeholder="Код комнаты" maxlength="6">
            <input type="text" id="playerNameInput" placeholder="Ваше имя" maxlength="20">
            <div class="btn-row">
                <button class="btn btn-primary" id="confirmJoinBtn">Войти</button>
                <button class="btn btn-danger" id="cancelJoinBtn">Отмена</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

<script>
(function() {
    'use strict';

    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const $ = (id) => document.getElementById(id);
    const random = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const generateAge = () => Math.floor(Math.random() * 50) + 18;
    const generateRoomId = () => Math.random().toString(36).substring(2, 8).toUpperCase();

    const haptic = {
        success: () => tg.HapticFeedback?.notificationOccurred('success'),
        error: () => tg.HapticFeedback?.notificationOccurred('error'),
        impact: (type = 'medium') => tg.HapticFeedback?.impactOccurred(type),
        selection: () => tg.HapticFeedback?.selectionChanged()
    };

    const toast = (message, type = 'info') => {
        const container = $('toastContainer');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerHTML = `<span>${type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️'}</span><span>${message}</span>`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    };

    const LS_KEY = 'bunker_game_';
    const SS_KEY = 'bunker_session';

    const saveGame = (roomId, gameData) => {
        gameData.lastUpdate = Date.now();
        localStorage.setItem(LS_KEY + roomId, JSON.stringify(gameData));
    };

    const loadGame = (roomId) => {
        const data = localStorage.getItem(LS_KEY + roomId);
        return data ? JSON.parse(data) : null;
    };

    const saveSession = (sessionData) => {
        sessionStorage.setItem(SS_KEY, JSON.stringify(sessionData));
    };

    const loadSession = () => {
        const data = sessionStorage.getItem(SS_KEY);
        return data ? JSON.parse(data) : null;
    };

    let state = {
        roomId: null,
        playerId: null,
        isHost: false,
        playerName: '',
        gameData: null,
        selectedVote: null
    };

    const DATA = {
        professions: ["Врач", "Инженер", "Пилот", "Военный", "Учёный", "Повар", "Механик", "Фермер", "Охотник", "Программист", "Сантехник", "Электрик", "Химик", "Биолог", "Психолог", "Журналист", "Водитель", "Сварщик", "Геолог", "Актёр"],
        health: ["Абсолютно здоров", "Крепкое здоровье", "Здоров", "Хронический бронхит", "Астма", "Диабет", "Проблемы с сердцем", "Гипертония", "Артрит", "Плохое зрение", "Отсутствует палец", "Аллергия", "Беременность"],
        mental: ["Нет фобий", "Клаустрофобия", "Агорафобия", "Боязнь темноты", "Боязнь высоты", "Боязнь крови", "Панические атаки", "Депрессия", "Паранойя", "ОКР", "Лунатизм", "Зависимость"],
        hobbies: ["Рыбалка", "Охота", "Садоводство", "Кулинария", "Чтение", "Музыка", "Спорт", "Туризм", "Фотография", "Программирование", "Шахматы", "Рисование"],
        luggage: ["Аптечка", "Нож", "Топор", "Пистолет", "Патроны", "Семена", "Книги", "Гитара", "Спички", "Фонарик", "Рация", "Палатка", "Спальник", "Консервы", "Вода"],
        personality: ["Лидер", "Ведомый", "Эгоист", "Альтруист", "Оптимист", "Пессимист", "Харизматичный", "Молчун", "Расчетливый", "Импульсивный"],
        bunkerTypes: ["Военный бункер", "Гражданское убежище", "Подземный завод", "Станция метро", "Научный комплекс", "Частный бункер", "Склад ГО"],
        bunkerSizes: ["Крошечный (2×2м)", "Маленький (5×5м)", "Средний (10×10м)", "Большой (20×20м)", "Огромный (50×50м)"],
        bunkerDepths: ["Поверхностный (3м)", "Средний (10м)", "Глубокий (25м)", "Очень глубокий (50м)", "Экстремальный (100м+)"],
        bunkerProtection: ["Слабая", "Средняя", "Высокая", "Максимальная", "Абсолютная"],
        bunkerSupplies: ["Пусто", "На неделю", "На месяц", "На год", "На 5 лет", "На 10 лет"],
        bunkerWater: ["Нет воды", "На день", "На неделю", "На месяц", "На год", "Бесконечно"],
        bunkerPower: ["Нет энергии", "Батарейки", "Генератор", "Солнечные панели", "Атомная батарея"],
        bunkerFeatures: ["Тихое место", "Сыро", "Тёплое", "Холодно", "ИИ управляет", "Роботы помогают", "Тайный выход"],
        disasterTypes: ["Ядерная война", "Зомби-апокалипсис", "Пандемия", "Падение астероида", "Восстание ИИ", "Климатическая катастрофа", "Извержение вулкана"],
        disasterCauses: ["Человеческий фактор", "Природный цикл", "Техническая ошибка", "Диверсия", "Космическое событие"],
        disasterScales: ["Локальный", "Региональный", "Национальный", "Глобальный"],
        disasterSurfaces: ["Полностью непригодна", "Опасно для жизни", "Можно в защите", "Относительно безопасно"],
        disasterThreats: ["Нет угроз", "Мутанты", "Банды мародёров", "Радиация", "Токсины"]
    };

    const PHASES = {
        LOBBY: 'lobby',
        REVEAL: 'reveal',
        VOTE: 'vote',
        RESULT: 'result',
        ENDED: 'ended'
    };

    const Generators = {
        bunker: () => ({
            type: random(DATA.bunkerTypes),
            size: random(DATA.bunkerSizes),
            depth: random(DATA.bunkerDepths),
            protection: random(DATA.bunkerProtection),
            supplies: random(DATA.bunkerSupplies),
            water: random(DATA.bunkerWater),
            power: random(DATA.bunkerPower),
            feature: random(DATA.bunkerFeatures)
        }),
        disaster: () => ({
            type: random(DATA.disasterTypes),
            cause: random(DATA.disasterCauses),
            scale: random(DATA.disasterScales),
            surface: random(DATA.disasterSurfaces),
            threat: random(DATA.disasterThreats)
        }),
        character: (name) => {
            const age = generateAge();
            const gender = random(["Мужчина", "Женщина"]);
            return {
                name,
                genderAge: `${gender}, ${age} лет`,
                age,
                gender,
                profession: random(DATA.professions),
                health: random(DATA.health),
                mental: random(DATA.mental),
                hobby: random(DATA.hobbies),
                luggage: random(DATA.luggage),
                personality: random(DATA.personality),
                revealedStats: [],
                votesReceived: 0,
                eliminated: false
            };
        }
    };

    const createGame = () => {
        const roomId = generateRoomId();
        const tgUser = getTelegramUser();
        const name = tgUser?.name || prompt('Введите имя:') || 'Игрок 1';
        
        state.roomId = roomId;
        state.playerId = 'p_' + Date.now();
        state.isHost = true;
        state.playerName = name;
        
        state.gameData = {
            roomId,
            hostId: state.playerId,
            phase: PHASES.LOBBY,
            round: 0,
            totalRounds: 0,
            bunker: null,
            disaster: null,
            players: [{
                id: state.playerId,
                name,
                character: null,
                revealedStats: [],
                votesReceived: 0,
                eliminated: false,
                votedFor: null
            }],
            history: [],
            lastUpdate: Date.now()
        };
        
        saveGame(roomId, state.gameData);
        saveSession({ roomId, playerId: state.playerId, playerName: name, isHost: true });
        updateUI();
        toast(`Комната ${roomId}`, 'success');
    };

    const joinGame = (roomId, name) => {
        const gameData = loadGame(roomId);
        if (!gameData) { toast('Комната не найдена', 'error'); return false; }
        
        state.roomId = roomId;
        state.playerId = 'p_' + Date.now();
        state.isHost = false;
        state.playerName = name;
        
        gameData.players.push({
            id: state.playerId, name, character: null, revealedStats: [], votesReceived: 0, eliminated: false, votedFor: null
        });
        
        saveGame(roomId, gameData);
        saveSession({ roomId, playerId: state.playerId, playerName: name, isHost: false });
        state.gameData = gameData;
        updateUI();
        toast(`Присоединился к ${roomId}`, 'success');
        return true;
    };

    const getTelegramUser = () => tg.initDataUnsafe?.user || null;
    const getActivePlayers = () => state.gameData.players.filter(p => !p.eliminated);
    const getSurvivorsCount = () => getActivePlayers().length;

    const startRound = () => {
        const game = state.gameData;
        const activeCount = getActivePlayers().length;
        
        // Устанавливаем количество раундов = игроков - 1 (чтобы остался 1)
        if (game.round === 0) {
            game.totalRounds = activeCount - 1;
        }
        
        game.round++;
        game.phase = PHASES.REVEAL;
        
        // Сброс состояния игроков - НО НЕ ПЕРСОНАЖЕЙ!
        game.players.forEach(p => {
            if (!p.eliminated) {
                // Создаём персонажа только если его нет
                if (!p.character) {
                    p.character = Generators.character(p.name);
                }
                // Сбрасываем только голоса
                p.votesReceived = 0;
                p.votedFor = null;
                // revealedStats НЕ сбрасываем - характеристики сохраняются!
            }
        });
        
        saveGame(game.roomId, game);
        updateUI();
        toast(`Раунд ${game.round}/${game.totalRounds}! Открывайте характеристики`, 'info');
    };

    const startVote = () => {
        const game = state.gameData;
        game.phase = PHASES.VOTE;
        game.players.forEach(p => {
            p.votesReceived = 0;
            p.votedFor = null;
        });
        saveGame(game.roomId, game);
        state.selectedVote = null;
        updateUI();
        toast('Голосование началось! Выберите одного игрока', 'warning');
    };

    const processVoteResults = () => {
        const game = state.gameData;
        const activePlayers = getActivePlayers();
        
        // Считаем голоса
        let maxVotes = 0;
        let eliminated = null;
        let tie = false;
        let abstainCount = 0;
        
        activePlayers.forEach(p => {
            if (p.votedFor === 'abstain') {
                abstainCount++;
            }
            if (p.votesReceived > maxVotes) {
                maxVotes = p.votesReceived;
                eliminated = p;
                tie = false;
            } else if (p.votesReceived === maxVotes && maxVotes > 0) {
                tie = true;
            }
        });
        
        $('eliminationResult').style.display = 'none';
        
        // Показываем статистику
        const voteStats = activePlayers.map(p => {
            const name = p.name.split(' ')[0];
            return `${name}: ${p.votesReceived}`;
        }).join(', ');
        
        toast(`Голоса: ${voteStats} | Воздержались: ${abstainCount}`, 'info');
        
        if (eliminated && maxVotes > 0 && !tie) {
            eliminated.eliminated = true;
            game.history.push({ 
                action: 'eliminated', 
                playerName: eliminated.name, 
                round: game.round, 
                votes: maxVotes 
            });
            
            $('eliminatedName').textContent = eliminated.name;
            $('eliminationResult').style.display = 'block';
            
            toast(`${eliminated.name} выгнан! (${maxVotes} голосов)`, 'error');
            haptic.error();
            
            // Проверка победы
            if (getSurvivorsCount() <= 1) {
                endGame();
                return;
            }
        } else if (tie) {
            toast('Ничья! Никто не выгнан', 'warning');
            haptic.selection();
        } else if (maxVotes === 0) {
            toast('Все воздержались! Никто не выгнан', 'success');
            haptic.success();
        }
        
        // Следующий раунд - НЕ сбрасываем персонажей!
        setTimeout(() => {
            game.phase = PHASES.LOBBY;
            game.players.forEach(p => {
                // НЕ сбрасываем character и revealedStats!
                p.votesReceived = 0;
                p.votedFor = null;
            });
            saveGame(game.roomId, game);
            $('eliminationResult').style.display = 'none';
            updateUI();
        }, 3000);
    };

    const endGame = () => {
        const game = state.gameData;
        game.phase = PHASES.ENDED;
        const winner = getActivePlayers()[0];
        
        $('statusText').textContent = winner ? `🏆 ПОБЕДИТЕЛЬ: ${winner.name}` : 'Игра окончена';
        $('survivorsCount').textContent = `Победитель: ${winner?.name || '???'}`;
        
        saveGame(game.roomId, game);
        toast(`Игра окончена! Победил ${winner?.name || '???'}`, 'success');
        haptic.success();
    };

    const revealStat = (statKey) => {
        const player = state.gameData.players.find(p => p.id === state.playerId);
        if (player?.character && !player.character.revealedStats.includes(statKey)) {
            player.character.revealedStats.push(statKey);
            saveGame(state.roomId, state.gameData);
            // Всегда передаём true - я вижу ВСЕ свои характеристики
            renderMyCharacter(player.character, true);
            updatePlayersGrid();
            
            const labels = { profession: 'Профессия', health: 'Здоровье', hobby: 'Хобби', luggage: 'Багаж', mental: 'Фобии', genderAge: 'Пол/Возраст' };
            toast(`Открыто: ${labels[statKey]}`, 'success');
        }
    };

    const voteForPlayer = (targetId) => {
        if (targetId === state.playerId) {
            toast('Нельзя голосовать за себя!', 'error');
            return;
        }
        
        const game = state.gameData;
        const player = game.players.find(p => p.id === state.playerId);
        
        // Снимаем предыдущий голос
        if (player.votedFor && player.votedFor !== 'abstain') {
            const prevTarget = game.players.find(p => p.id === player.votedFor);
            if (prevTarget) prevTarget.votesReceived--;
        }
        
        // Голосуем за нового
        const target = game.players.find(p => p.id === targetId);
        if (target) {
            target.votesReceived++;
            player.votedFor = targetId;
            state.selectedVote = targetId;
        }
        
        saveGame(game.roomId, game);
        renderVoteSection();
        haptic.selection();
        
        // Проверка: все ли проголосовали
        checkAllVoted();
    };

    window.voteAbstain = () => {
        const game = state.gameData;
        const player = game.players.find(p => p.id === state.playerId);
        
        // Снимаем предыдущий голос
        if (player.votedFor && player.votedFor !== 'abstain') {
            const prevTarget = game.players.find(p => p.id === player.votedFor);
            if (prevTarget) prevTarget.votesReceived--;
        }
        
        player.votedFor = 'abstain';
        state.selectedVote = 'abstain';
        
        saveGame(game.roomId, game);
        renderVoteSection();
        haptic.selection();
        toast('Вы воздержались', 'info');
        
        checkAllVoted();
    };

    const checkAllVoted = () => {
        const activePlayers = getActivePlayers();
        const allVoted = activePlayers.every(p => p.votedFor !== null);
        
        if (allVoted) {
            setTimeout(() => processVoteResults(), 1500);
        }
    };

    const updateUI = () => {
        if (!state.gameData) return;
        const game = state.gameData;
        
        $('roomBar').style.display = 'flex';
        $('roomCodeDisplay').textContent = game.roomId;
        $('roundDisplay').textContent = game.round;
        $('totalRounds').textContent = game.totalRounds || '-';
        $('playersCount').textContent = game.players.length;
        $('hostControls').style.display = state.isHost ? 'flex' : 'none';
        $('mainMenu').style.display = 'none';
        $('gameArea').style.display = 'block';
        
        // Status
        const survivors = getActivePlayers();
        $('gameStatus').style.display = 'flex';
        $('survivorsCount').textContent = `Выживших: ${survivors.length}`;
        
        const statusTexts = {
            [PHASES.LOBBY]: 'Нажмите "Начать раунд"',
            [PHASES.REVEAL]: 'Откройте характеристики',
            [PHASES.VOTE]: 'Голосование',
            [PHASES.RESULT]: 'Результат',
            [PHASES.ENDED]: 'Игра окончена'
        };
        $('statusText').textContent = statusTexts[game.phase] || '...';
        
        // Кнопки
        const activePlayers = getActivePlayers();
        const showStartRound = (game.phase === PHASES.LOBBY || game.phase === PHASES.RESULT) && activePlayers.length >= 1;
        const showStartVote = game.phase === PHASES.REVEAL;
        
        $('startRoundBtn').style.display = showStartRound ? 'block' : 'none';
        $('startRoundBtn').textContent = game.round === 0 ? '▶️ НАЧАТЬ ИГРУ' : '▶️ СЛЕДУЮЩИЙ РАУНД';
        $('startVoteBtn').style.display = showStartVote ? 'block' : 'none';
        $('voteSection').style.display = game.phase === PHASES.VOTE ? 'block' : 'none';
        
        if (game.phase === PHASES.VOTE) {
            renderVoteSection();
        }
        
        updatePlayersGrid();
        if (game.bunker) renderBunker(game.bunker);
        if (game.disaster) renderDisaster(game.disaster);
        
        // Моя карточка - вижу ВСЕ характеристики всегда
        const myPlayer = game.players.find(p => p.id === state.playerId);
        if (myPlayer?.character && !myPlayer.eliminated) {
            renderMyCharacter(myPlayer.character, true); // true = я вижу всё
            $('myCharacterCard').style.display = 'block';
            
            // Показываем кнопку выбора характеристик, только если не все открыты
            const allRevealed = myPlayer.character.revealedStats.length >= 6;
            $('statSelect').style.display = allRevealed ? 'none' : 'grid';
        }
    };

    const updatePlayersGrid = () => {
        const grid = $('playersGrid');
        const game = state.gameData;
        const myPlayer = game.players.find(p => p.id === state.playerId);
        
        grid.innerHTML = game.players.map(p => {
            const count = p.character?.revealedStats?.length || 0;
            const total = 6;
            let statusClass = '';
            let statusText = '⏳ Ожидание';
            
            if (p.eliminated) {
                statusClass = 'eliminated';
                statusText = '❌ Выгнан';
            } else if (p.character) {
                statusClass = 'revealed';
                // Другие видят только открытые, я вижу все
                statusText = `${count}/${total} открыто`;
            }
            
            return `<div class="player-item ${p.id === state.playerId ? 'is-you' : ''} ${p.id === game.hostId ? 'is-host' : ''}">
                <div class="name">${p.name} ${p.id === state.playerId ? '(Вы)' : ''} ${p.id === game.hostId ? '👑' : ''}</div>
                <div class="status ${statusClass}">${statusText}</div>
                ${p.character ? `<div class="stats-progress">${p.character.profession}</div>` : ''}
                ${game.phase === PHASES.VOTE && p.votesReceived > 0 ? `<div class="votes-count">Голосов: ${p.votesReceived}</div>` : ''}
            </div>`;
        }).join('');
    };

    const renderVoteSection = () => {
        const container = $('votePlayersList');
        const activePlayers = getActivePlayers();
        
        container.innerHTML = `
            <div class="vote-player-card" style="border-color: var(--success);">
                <div class="player-info">
                    <span class="player-name" style="color: var(--success);">⚠️ Воздержаться</span>
                </div>
                <div class="player-stats">Никого не выгонять</div>
                <div class="vote-actions">
                    <button class="btn-vote-eliminate ${state.selectedVote === 'abstain' ? 'selected' : ''}" 
                            onclick="window.voteAbstain()"
                            style="background: ${state.selectedVote === 'abstain' ? 'var(--success)' : 'rgba(0,255,136,0.2)'}; border-color: var(--success); color: ${state.selectedVote === 'abstain' ? '#000' : 'var(--success)'};">
                        ${state.selectedVote === 'abstain' ? '✓ Выбрано' : 'Воздержаться'}
                    </button>
                </div>
            </div>
        ` + activePlayers.map(p => `
            <div class="vote-player-card">
                <div class="player-info">
                    <span class="player-name">${p.name} ${p.id === state.playerId ? '(Вы)' : ''}</span>
                    ${p.votesReceived > 0 ? `<span style="color:var(--danger);font-weight:700;">🗳️ ${p.votesReceived}</span>` : ''}
                </div>
                <div class="player-stats">${p.character?.profession || '?'} • ${p.character?.genderAge || '?'}</div>
                <div class="vote-actions">
                    <button class="btn-vote-eliminate ${state.selectedVote === p.id ? 'selected' : ''}" 
                            onclick="window.voteForPlayer('${p.id}')"
                            ${p.id === state.playerId ? 'disabled' : ''}>
                        ${p.id === state.playerId ? 'Себя нельзя' : (state.selectedVote === p.id ? '✓ Выбран' : 'Выгнать')}
                    </button>
                </div>
            </div>
        `).join('');
    };

    // Рендер моей карточки - я вижу ВСЕ характеристики всегда
    const renderMyCharacter = (char, isMyCard = false) => {
        $('myCharacterName').textContent = char.name;
        const stats = [
            { key: 'profession', label: 'Профессия' }, { key: 'health', label: 'Здоровье' },
            { key: 'hobby', label: 'Хобби' }, { key: 'luggage', label: 'Багаж' },
            { key: 'mental', label: 'Фобии' }, { key: 'genderAge', label: 'Пол/Возраст' }
        ];
        
        $('myCharacterStats').innerHTML = stats.map(s => {
            const revealed = char.revealedStats.includes(s.key);
            
            // Если это моя карточка - я вижу ВСЕ характеристики всегда
            if (isMyCard) {
                const className = revealed ? 'revealed' : 'my-hidden';
                return `<div class="stat-item ${className}">
                    <span class="stat-label">${s.label}:</span>
                    <span class="stat-value">${char[s.key]}</span>
                </div>`;
            }
            
            // Для других - показываем только открытые
            const isHidden = !revealed;
            return `<div class="stat-item ${isHidden ? 'hidden' : 'revealed'}">
                <span class="stat-label">${s.label}:</span>
                <span class="stat-value ${isHidden ? 'hidden' : ''}">${revealed ? char[s.key] : '❓ Скрыто'}</span>
            </div>`;
        }).join('');
        
        // Блокируем уже открытые кнопки
        $('statSelect').querySelectorAll('.stat-select-btn').forEach(btn => {
            btn.disabled = char.revealedStats.includes(btn.dataset.stat);
        });
    };

    const renderBunker = (bunker) => {
        const labels = { type: 'Тип', size: 'Размер', depth: 'Глубина', protection: 'Защита', supplies: 'Запасы', water: 'Вода', power: 'Энергия', feature: 'Особенность' };
        $('bunkerContent').innerHTML = Object.entries(bunker).map(([k, v]) => 
            `<div class="stat-item revealed"><span class="stat-label">${labels[k]}:</span><span class="stat-value">${v}</span></div>`
        ).join('');
        $('bunkerCard').style.display = 'block';
    };

    const renderDisaster = (disaster) => {
        const labels = { type: 'Тип', cause: 'Причина', scale: 'Масштаб', surface: 'Поверхность', threat: 'Угроза' };
        $('disasterContent').innerHTML = Object.entries(disaster).map(([k, v]) => 
            `<div class="stat-item revealed"><span class="stat-label">${labels[k]}:</span><span class="stat-value">${v}</span></div>`
        ).join('');
        $('disasterCard').style.display = 'block';
    };

    const setupEvents = () => {
        $('createRoomBtn').onclick = () => { haptic.impact(); createGame(); };
        $('joinRoomBtn').onclick = () => { haptic.impact(); $('joinModal').classList.add('active'); };
        $('cancelJoinBtn').onclick = () => $('joinModal').classList.remove('active');
        $('confirmJoinBtn').onclick = () => {
            const code = $('roomCodeInput').value.toUpperCase().trim();
            const name = $('playerNameInput').value.trim() || 'Игрок';
            if (code && joinGame(code, name)) $('joinModal').classList.remove('active');
        };
        
        $('startRoundBtn').onclick = () => {
            haptic.impact();
            startRound();
        };
        
        $('startVoteBtn').onclick = () => {
            haptic.impact();
            startVote();
        };
        
        $('genBunkerBtn').onclick = () => {
            haptic.impact();
            state.gameData.bunker = Generators.bunker();
            saveGame(state.roomId, state.gameData);
            renderBunker(state.gameData.bunker);
            toast('Бункер создан', 'success');
        };
        $('genDisasterBtn').onclick = () => {
            haptic.impact();
            state.gameData.disaster = Generators.disaster();
            saveGame(state.roomId, state.gameData);
            renderDisaster(state.gameData.disaster);
            toast('Катастрофа создана', 'success');
        };
        
        $('statSelect').addEventListener('click', (e) => {
            if (e.target.classList.contains('stat-select-btn') && !e.target.disabled) {
                haptic.selection();
                revealStat(e.target.dataset.stat);
            }
        });
    };

    // Глобальные функции
    window.voteForPlayer = voteForPlayer;
    window.voteAbstain = voteAbstain;

    const init = () => {
        setupEvents();
        const session = loadSession();
        if (session?.roomId) {
            const game = loadGame(session.roomId);
            if (game) { state = { ...state, ...session, gameData: game }; updateUI(); }
        }
        setInterval(() => {
            if (state.roomId) {
                const game = loadGame(state.roomId);
                if (game?.lastUpdate > state.gameData?.lastUpdate) { state.gameData = game; updateUI(); }
            }
        }, 2000);
    };

    init();
})();
</script>
</body>
</html>
